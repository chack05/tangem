<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duc Anh & Mai Uyen</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body class="not-loaded">
  <div id="petals-container"></div>

  <div class="love-message">
    <h1>Đức Anh Yêu Mai Uyên</h1>
  </div>

  <div class="night"></div>
  <div class="flowers">
    <div class="flower flower--1">
      <div class="flower__leafs flower__leafs--1">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
        <div class="flower__light flower__light--5"></div>
        <div class="flower__light flower__light--6"></div>
      </div>
      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
      </div>
    </div>

    <div class="flower flower--2">
      <div class="flower__leafs flower__leafs--2">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
      </div>
      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
        <div class="flower__line__leaf flower__line__leaf--3"></div>
        <div class="flower__line__leaf flower__line__leaf--4"></div>
      </div>
    </div>

    <div class="flower flower--3">
      <div class="flower__leafs flower__leafs--3">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
        <div class="flower__light flower__light--1"></div>
        <div class="flower__light flower__light--2"></div>
        <div class="flower__light flower__light--3"></div>
        <div class="flower__light flower__light--4"></div>
      </div>
      <div class="flower__line">
        <div class="flower__line__leaf flower__line__leaf--1"></div>
        <div class="flower__line__leaf flower__line__leaf--2"></div>
      </div>
    </div>

    <div class="flower flower--4 pink-flower">
      <div class="flower__leafs flower__leafs--1">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--5 pink-flower">
      <div class="flower__leafs flower__leafs--2">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="grow-ans" style="--d:1.2s">
      <div class="flower__g-long">
        <div class="flower__g-long__top"></div>
        <div class="flower__g-long__bottom"></div>
      </div>
    </div>
    <div class="growing-grass"><div class="flower__grass flower__grass--1"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__leaf flower__grass__leaf--4"></div><div class="flower__grass__overlay"></div></div></div>
    <div class="growing-grass"><div class="flower__grass flower__grass--2"><div class="flower__grass--top"></div><div class="flower__grass--bottom"></div><div class="flower__grass__leaf flower__grass__leaf--1"></div><div class="flower__grass__leaf flower__grass__leaf--2"></div><div class="flower__grass__leaf flower__grass__leaf--3"></div><div class="flower__grass__overlay"></div></div></div>
    <div class="grow-ans" style="--d:2.4s"><div class="flower__g-right flower__g-right--1"><div class="leaf"></div></div></div>
    <div class="grow-ans" style="--d:2.8s"><div class="flower__g-front"><div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--1"><div class="flower__g-front__leaf"></div></div><div class="flower__g-front__leaf-wrapper flower__g-front__leaf-wrapper--2"><div class="flower__g-front__leaf"></div></div><div class="flower__g-front__line"></div></div></div>
    
    <div class="long-g long-g--0"><div class="grow-ans" style="--d:3s"><div class="leaf leaf--0"></div></div><div class="grow-ans" style="--d:2.2s"><div class="leaf leaf--1"></div></div></div>
    <div class="long-g long-g--1"><div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--0"></div></div><div class="grow-ans" style="--d:3.8s"><div class="leaf leaf--1"></div></div></div>
    <div class="long-g long-g--2"><div class="grow-ans" style="--d:4s"><div class="leaf leaf--0"></div></div><div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div></div>
  </div>

  <style>
    /* CSS CHO DÒNG CHỮ VÀ CÁNH HOA */
    .love-message {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    .love-message h1 {
      font-family: 'Dancing Script', cursive; /* Chữ kiểu */
      font-size: 4.5rem;
      color: #9cdcf6; /* Xanh nhẹ nhàng */
      text-shadow: 0 0 10px rgba(156, 220, 246, 0.6), 0 0 20px rgba(156, 220, 246, 0.4); 
      animation: gentle-glow 3s infinite alternate;
      margin: 0;
    }

    @keyframes gentle-glow {
      from { opacity: 0.85; transform: scale(1); }
      to { opacity: 1; transform: scale(1.02); }
    }

    /* Hiệu ứng cánh hoa rơi */
    #petals-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; pointer-events: none; z-index: 50;
    }
    .petal {
      position: absolute;
      background-image: linear-gradient(to bottom right, #ffb3c6, #ff8fab);
      border-radius: 15px 0 15px 0;
      opacity: 0.6;
      box-shadow: 0 0 5px rgba(255, 143, 171, 0.3);
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(100px); opacity: 0; }
    }

    /* CSS CHO HOA HỒNG THÊM VÀO */
    .flower--4 { left: 25%; transform: scale(0.6) rotate(15deg) translateY(10vmin); z-index: 5; animation: moving-flower-4 4s linear infinite; }
    .flower--5 { left: 75%; transform: scale(0.65) rotate(-20deg) translateY(5vmin); z-index: 5; animation: moving-flower-5 5s linear infinite; }
    
    @keyframes moving-flower-4 { 0%, 100% { transform: scale(0.6) rotate(15deg) translateY(10vmin); } 50% { transform: scale(0.6) rotate(18deg) translateY(10vmin); } }
    @keyframes moving-flower-5 { 0%, 100% { transform: scale(0.65) rotate(-20deg) translateY(5vmin); } 50% { transform: scale(0.65) rotate(-23deg) translateY(5vmin); } }

    .pink-flower .flower__leaf {
      background-color: #ff6b9e !important;
      background-image: linear-gradient(to top, #ff3377, #ffb3cc) !important;
      box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.4) !important;
    }
    .pink-flower .flower__leaf--4 {
      background-image: linear-gradient(to top, #ff3377, #fff) !important;
    }
    .pink-flower .flower__line {
      height: 45vmin !important;
      background-image: linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)), linear-gradient(to top, transparent 10%, #7a143b, #d6396e) !important;
    }

    /* =========================================
       CSS GỐC CỦA BẠN (ĐÃ ĐƯỢC LÀM GỌN)
       ========================================= */
    *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
    :root { --dark-color: #040814; }
    body { display: flex; align-items: flex-end; justify-content: center; min-height: 100vh; background-color: var(--dark-color); overflow: hidden; perspective: 1000px; }
    
    .night { position: fixed; left: 50%; top: 0; transform: translateX(-50%); width: 100%; height: 100%; filter: blur(0.1vmin); background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 233, 255, 0.1)); }
    
    .flowers { position: relative; transform: scale(0.75) translateY(5vmin); }
    .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
    
    .flower--1 { left: 40%; animation: moving-flower-1 4s linear infinite; }
    .flower--2 { left: 55%; transform: rotate(20deg); animation: moving-flower-2 4s linear infinite; }
    .flower--3 { left: 45%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
    
    .flower__line { height: 55vmin; width: 1.5vmin; background-image: linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)), linear-gradient(to top, transparent 10%, #14757a, #39c6d6); box-shadow: inset 0 0 2px rgba(0,0,0,0.5); animation: grow-flower-tree 4s backwards; border-radius: 4px; }
    .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
    .flower--2 .flower__line { height: 60vmin; animation-delay: 0.8s; }
    .flower--3 .flower__line { height: 50vmin; animation-delay: 0.9s; }
    
    .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
    .flower__leafs--1 { animation-delay: 1.1s; } .flower__leafs--2 { animation-delay: 1.4s; } .flower__leafs--3 { animation-delay: 1.7s; }
    .flower__leafs::after { content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); width: 8vmin; height: 8vmin; background-color: #6bf0ff; filter: blur(10vmin); }
    .pink-flower .flower__leafs::after { background-color: #ff6b9e; filter: blur(8vmin); } /* Sáng hồng cho hoa hồng */

    .flower__leaf { position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin; border-radius: 51% 49% 47% 53%/44% 45% 55% 69%; background-color: #65e6cc; background-image: linear-gradient(to top, #40bbab, #a7ffee); transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5); }
    .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
    .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 { width: 8vmin; height: 8vmin; transform-origin: bottom left; border-radius: 4vmin 10vmin 4vmin 4vmin; transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top, #39c6d6, #a7ffee); z-index: 1; opacity: 0.8; }
    
    .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
    
    .flower__line__leaf { --w: 7vmin; --h: calc(var(--w) + 2vmin); position: absolute; top: 20%; left: 90%; width: var(--w); height: var(--h); border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); background-image: linear-gradient(to top, rgba(20, 117, 122, 0.4), #39c6d6); }
    .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3, .flower__line__leaf--4 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); left: -460%; top: 12%; transform: rotate(-70deg) rotateY(30deg); }
    .flower__line__leaf--4 { top: 40%; }
    
    .flower__light { position: absolute; bottom: 0vmin; width: 1vmin; height: 1vmin; background-color: #fffb00; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite backwards; }
    .flower__light:nth-child(odd) { background-color: #23f0ff; }
    .flower__light--1 { left: -2vmin; animation-delay: 1s; } .flower__light--2 { left: 3vmin; animation-delay: 0.5s; } .flower__light--3 { left: -6vmin; animation-delay: 0.3s; } .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }

    .flower__grass { --c: #159faa; --line-w: 1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; z-index: 20; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); }
    .flower__grass--1 { animation: moving-grass 2s linear infinite; }
    .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: 0.8; z-index: 0; animation: moving-grass--2 1.5s linear infinite; }
    .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
    .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }
    .flower__grass__leaf { --size: 10vmin; position: absolute; width: calc(var(--size) * 2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top, transparent, transparent 30%, var(--c)); z-index: 100; }
    .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); }
    .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); }
    
    /* Animations */
    @keyframes light-ans { 0% { opacity: 0; transform: translateY(0vmin); } 25% { opacity: 1; transform: translateY(-5vmin) translateX(-2vmin); } 50% { opacity: 1; transform: translateY(-15vmin) translateX(2vmin); filter: blur(0.2vmin); } 75% { transform: translateY(-20vmin) translateX(-2vmin); filter: blur(0.2vmin); } 100% { transform: translateY(-30vmin); opacity: 0; filter: blur(1vmin); } }
    @keyframes moving-flower-1 { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
    @keyframes moving-flower-2 { 0%, 100% { transform: rotate(20deg); } 50% { transform: rotate(16deg); } }
    @keyframes moving-flower-3 { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(-18deg); } }
    @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
    @keyframes blooming-flower { 0% { transform: scale(0); } }
    @keyframes moving-grass { 0%, 100% { transform: rotate(-48deg) rotateY(40deg); } 50% { transform: rotate(-50deg) rotateY(40deg); } }
    @keyframes moving-grass--2 { 0%, 100% { transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); } 50% { transform: scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg); } }
    @keyframes grow-ans { 0% { transform: scale(0); opacity: 0; } }

    .not-loaded * { animation-play-state: paused !important; }
  </style>

  <script>
    // JS Tạo cánh hoa rơi mượt mà
    function createPetals() {
      const container = document.getElementById('petals-container');
      const petalCount = 35; // Số lượng cánh hoa

      for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        
        // Random vị trí, kích thước và tốc độ cho từng cánh hoa
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.width = (Math.random() * 10 + 8) + 'px';
        petal.style.height = petal.style.width;
        petal.style.animationDuration = (Math.random() * 4 + 5) + 's';
        petal.style.animationDelay = Math.random() * 5 + 's';
        
        container.appendChild(petal);
      }
    }

    onload = () => {
      createPetals();
      const c = setTimeout(() => {
        document.body.classList.remove("not-loaded");
        clearTimeout(c);
      }, 1000);
    };
  </script>
</body>
</html>
